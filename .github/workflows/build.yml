name: build

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        rid: [win-x64, win-x86]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Build
        run: dotnet build -c Release

      - name: Publish (${{ matrix.rid }})
        run: |
          dotnet publish -c Release -r ${{ matrix.rid }} `
            --self-contained false `
            -p:PublishSingleFile=true -p:DebugType=none
          copy bin/Release/net8.0-windows/${{ matrix.rid }}/publish/lpastlai.exe "L'Pastlai-${{ matrix.rid }}.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: L'Pastlai-${{ matrix.rid }}
          path: L'Pastlai-${{ matrix.rid }}.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: L'Pastlai-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            L'Pastlai-win-x64.exe
            L'Pastlai-win-x86.exe
          generate_release_notes: true
